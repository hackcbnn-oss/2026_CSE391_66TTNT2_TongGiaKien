<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Flexbox</title>
    <style>
        /* Thiết lập cơ bản */
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Khung bao ngoài cùng */
        .form-container {
            border: 1px solid #000;
            padding: 30px;
            max-width: 800px;
            margin: 20px auto;
        }

        /* Tiêu đề form */
        .form-title {
            color: #555;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Khung chứa các input (Sử dụng Flexbox) */
        .form-row {
            display: flex;
            gap: 20px; /* Khoảng cách giữa 2 input */
            margin-bottom: 15px;
        }

        /* Các ô nhập liệu */
        .form-control {
            flex: 1; /* Để các ô tự động chia đều chiều rộng */
            padding: 12px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .form-control::placeholder {
            color: #999;
        }

        /* Ô nhập tin nhắn (textarea) */
        textarea.form-control {
            width: 100%;
            min-height: 180px;
            resize: vertical;
        }

        /* Phần dưới cùng: Nút bấm và Text ghi chú (Sử dụng Flexbox) */
        .form-footer {
            display: flex;
            justify-content: space-between; /* Đẩy nút qua trái, chữ qua phải */
            align-items: center; /* Căn giữa theo chiều dọc */
            margin-top: 10px;
        }

        /* Nút gửi */
        .btn-submit {
            background-color: #7bd0f6;
            color: white;
            border: 1px solid #6cbce0;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-submit:hover {
            background-color: #5cbeee;
        }

        /* Chữ ghi chú */
        .note-text {
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-title">
            Get in touch with us by filling contact form below
        </div>
        
        <form action="#">
            <div class="form-row">
                <input type="text" class="form-control" placeholder="* Enter your full name">
                <input type="email" class="form-control" placeholder="* Enter your email address">
            </div>

            <div class="form-row">
                <input type="text" class="form-control" placeholder="Enter your subject">
            </div>

            <div class="form-row">
                <textarea class="form-control" placeholder="* Your message here..."></textarea>
            </div>

            <div class="form-footer">
                <button type="button" class="btn-submit">Send message</button>
                <span class="note-text">* Please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>

</body>
</html>
