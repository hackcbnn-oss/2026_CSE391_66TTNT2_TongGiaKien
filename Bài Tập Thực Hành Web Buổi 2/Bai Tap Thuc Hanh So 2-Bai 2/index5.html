<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe's Travel Page - Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === RESET CSS === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* === HEADER === */
        header {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 10;
        }

        .logo {
            color: #fce879; 
            font-size: 24px;
            font-weight: bold;
            font-family: 'Brush Script MT', cursive; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        nav a {
            color: #fce879;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        nav a:hover {
            text-decoration: underline;
        }

        
        main {
            width: 100%;
        }

        
        .hero {
            position: relative;
            width: 100%;
            height: 60vh;
            background: url('https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcTWQKCw_jFvWrnW4S0HQt0fNWaMbIMaS7Baap5kW_wzolqpYPVA') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-box {
            background-color: rgba(50, 50, 50, 0.85); /* Nền tối, hơi trong suốt */
            padding: 40px 60px;
            text-align: center;
            color: white;
            border-radius: 4px;
        }

        .hero-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .hero-box p {
            font-size: 12px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #ccc;
        }

        .btn-discover {
            background-color: #fce879;
            color: #333;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-discover:hover {
            background-color: #e5d160;
        }

        /* 2. HIGHLIGHTS SECTION */
        .highlights {
            background-color: #e0fdfd; /* Xanh lơ nhạt */
            padding: 50px 20px;
            text-align: center;
        }

        .highlights h2 {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .cards-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            flex: 1;
            background: transparent;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 12px;
            font-weight: bold;
            color: #777;
        }

        .card-title span {
            color: #2db8a2; /* Màu xanh lá cho tên quốc gia */
        }

        /* === FOOTER === */
        footer {
            background-color: #1a1a1a; /* Màu nền xám đen */
            padding: 20px;
            text-align: center;
        }

        .social-icons a {
            color: white;
            font-size: 24px;
            margin: 0 10px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #fce879;
        }
    </style>
</head>
<body>
